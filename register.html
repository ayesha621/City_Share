<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <title>CityShare</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>

<body>

<!-- Top Bar -->
<div class="topbar d-flex align-items-center px-4 py-3">
  <img src="logo.png" width="50">
  <div class="topBarText">
    <h6 class="m-0">CityShare</h6>
    <small>Toronto, ON ⏷</small>
  </div>
</div>

<div class ="register-box"> 
<div class="row">
    <section class="card otherHalf">
    <!-- Role Selection -->
        <h6>Select Role</h6>
        <label><input type="radio" name="role"> User</label><br>
        <label><input type="radio" name="role"> Driver</label>
    </section>

    <section class="card half">
        <!-- Form -->
        <label>Email</label>
        <input type="email" class="email">

        <label>Create Username</label>
        <input type="userName" class="userName" >
        
        <label>Create Password</label>
        <input type="password" class="password">

        <label>Confirm Password</label>
        <input type="password" class="password">
    </section>

        <a href="loginpage.html">
            <button class="createAccountBtn">Create Account</button>
        </a>


</div>
</div>

<!-- Back Button -->
<div class="px-4 mt-3">
  <a href="firstpage.html">
    <button class="back-btn">Back</button>
  </a>
</div>



</body>
</html>
